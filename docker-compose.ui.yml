services:
  litellm-proxy:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        USERNAME: ${USERNAME:-litellm}
        USER_PASSWORD: ${USER_PASSWORD:-changeme123}
        CONTAINER_HOSTNAME: ${CONTAINER_HOSTNAME:-litellm-proxy}
    container_name: ${CONTAINER_NAME:-litellm-proxy}
    hostname: "${CONTAINER_HOSTNAME:-litellm-proxy}"
    networks:
      macvlan-for-direct-access:
        ipv4_address: ${CONTAINER_IP:-192.168.111.50}
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE:-UTC}
      - BUILD_HOSTNAME=${CONTAINER_HOSTNAME:-litellm-proxy}
      - USERNAME=${USERNAME:-litellm}
      - USER_PASSWORD=${USER_PASSWORD:-changeme123}

networks:
  macvlan-for-direct-access:
    # Default: auto-create network (works out-of-the-box)
    # To use existing network instead, comment out the config below
    # and uncomment: external: true
    driver: macvlan
    driver_opts:
      parent: ${NETWORK_INTERFACE:-enp2s0}
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET:-192.168.111.0/24}
          gateway: ${NETWORK_GATEWAY:-192.168.111.254}
          ip_range: ${NETWORK_IP_RANGE:-192.168.111.48/29}
    # external: true  # Uncomment to use existing network instead
