model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: qwen/qwen3-coder-480b-a35b-instruct
      api_key: os.environ/NVIDIA_NIM_API_KEY
      drop_params: true

  - model_name: claude-opus-4-7
    litellm_params:
      model: minimaxai/minimax-m2.7
      api_key: os.environ/NVIDIA_NIM_API_KEY
      drop_params: true

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: abacusai/dracarys-llama-3.1-70b-instruct
      api_key: os.environ/NVIDIA_NIM_API_KEY
      drop_params: true

# Direct Gemini access
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY
      drop_params: true

litellm_settings:
  drop_params: true

general_settings:
  master_key: DUMMY_KEY
  # Default model when client doesn't specify one
  default_model: claude-sonnet-4-6
  # SQLite database for Admin UI support (only for UI-enabled deployments)
  # Uncomment for docker-compose.external-network.yml (Debian with UI)
  # database_url: "sqlite:////home/litellm/.config/litellm/litellm.db"
